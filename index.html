<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello, World!</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(255, 255, 255, 0.06);
      --accent: #38bdf8;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at 30% 20%, #1e293b, var(--bg));
      color: var(--text);
      text-align: center;
      padding: 1.5rem;
    }
    .card {
      background: var(--card);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      max-width: 460px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }
    h1 {
      font-size: clamp(2.2rem, 6vw, 3.2rem);
      background: linear-gradient(90deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.75rem;
    }
    p { color: var(--muted); font-size: 1.05rem; line-height: 1.6; }
    .wave { display: inline-block; animation: wave 2s ease-in-out infinite; transform-origin: 70% 70%; }
    @keyframes wave {
      0%, 60%, 100% { transform: rotate(0deg); }
      10%, 30% { transform: rotate(14deg); }
      20% { transform: rotate(-8deg); }
    }
    footer { margin-top: 1.5rem; font-size: 0.85rem; color: var(--muted); }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Hello, World! <span class="wave">👋</span></h1>
    <p>This site is live on GitHub Pages.</p>
    <footer>Built with <a href="https://claude.com/claude-code">Claude Code</a></footer>
  </main>
</body>
</html>
